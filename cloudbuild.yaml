steps:
  # Build da imagem Docker
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "$_IMAGE"
      - .

  # Push para o Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "$_IMAGE"

  # Deploy no Cloud Run com secrets
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - siact-mrosc
      - --image=$_IMAGE
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --port=8080
      - --set-env-vars=NODE_ENV=production,SUPABASE_URL=https://eaojggxtsuzplrjgytbt.supabase.co,VITE_SUPABASE_URL=https://eaojggxtsuzplrjgytbt.supabase.co
      - --update-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,VITE_SUPABASE_ANON_KEY=VITE_SUPABASE_ANON_KEY:latest

substitutions:
  _REGION: southamerica-east1
  _IMAGE: southamerica-east1-docker.pkg.dev/gen-lang-client-0565048097/siact/siact-mrosc:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
